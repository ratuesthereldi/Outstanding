<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tereos FKS — Sales Data Forecast</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef5fc;--surface:#fff;--surface2:#f4f9ff;--border:#ccdff2;--border2:#9fc3e0;
  --text:#0b1e33;--text2:#2e5070;--text3:#7099ba;
  --accent:#1565c0;--accent2:#0d47a1;--accent-light:#dbeeff;
  --navy:#1a2f4a;--green:#1b6b3a;--green-bg:#d4f0e0;
  --red:#b83228;--red-bg:#fde8e6;--amber:#b45309;
  --mono:'JetBrains Mono',monospace;--sans:'Poppins',sans-serif;
  --shadow:0 1px 4px rgba(10,40,80,.10),0 4px 18px rgba(10,40,80,.07);
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
/* TOPBAR */
.topbar{background:var(--surface);border-bottom:2px solid #9fc3e0;padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.logo-text{font-size:15px;font-weight:700;color:var(--text)}.logo-text span{color:var(--accent)}
.topbar-sep{width:1px;height:20px;background:var(--border)}
.topbar-sub{font-size:12px;color:var(--text2)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-family:var(--sans);font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:#fff;border:1.5px solid var(--border2);color:var(--accent)}.btn-outline:hover{border-color:var(--accent);background:var(--accent-light)}
/* PRODUCT TABS */
.prod-tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 16px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.prod-tabs::-webkit-scrollbar{display:none}
.prod-tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;margin-bottom:-2px;white-space:nowrap;font-family:var(--sans)}
.prod-tab:hover{color:var(--accent)}.prod-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* UPLOAD */
#uploadSection{padding:40px 24px}
.upload-card{max-width:520px;margin:0 auto;background:var(--surface);border:2px dashed var(--border2);border-radius:16px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.upload-card:hover,.upload-card.drag{border-color:var(--accent);background:var(--accent-light);transform:translateY(-2px)}
.upload-card input{display:none}
.upload-icon{font-size:36px;margin-bottom:14px}
.upload-title{font-size:17px;font-weight:700;margin-bottom:8px}
.upload-sub{font-size:13px;color:var(--text2);line-height:1.6}
.upload-sub a{color:var(--accent);font-weight:500}
.demo-btn{margin-top:16px;background:none;border:1.5px solid var(--border2);color:var(--text2);padding:8px 18px;border-radius:99px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:500;transition:all .15s}
.demo-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
/* FILTERS */
.filters-bar{padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.flabel{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
select,input[type=text]{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
select:focus,input[type=text]:focus{border-color:var(--accent)}
/* STATS */
.stats-row{display:flex;background:var(--navy);border-bottom:3px solid #9fc3e0}
.stat-cell{flex:1;padding:12px 20px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:4px}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:10px;color:rgba(180,210,240,.7);font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.stat-val{font-size:24px;font-weight:800;font-family:var(--mono);color:#fff;line-height:1}
.stat-val.blue{color:#64b5f6}.stat-val.green{color:#66bb6a}.stat-val.red{color:#ef9a9a}.stat-val.amber{color:#ffcc02}
/* TABLE */
.table-wrap{overflow:auto;max-height:calc(100vh - 240px);background:var(--surface)}
table{width:100%;border-collapse:collapse;min-width:800px}
thead th{background:#1a2f4a !important;color:#b8d8f4 !important;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;position:sticky;top:0;z-index:10;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1);cursor:pointer;user-select:none;font-family:var(--sans)}
thead th:hover{background:#1f5a9e !important}
thead th.mth{background:#1a3055 !important;color:#fff !important;text-align:center;font-size:9.5px;font-weight:700;min-width:60px;padding:8px 5px}
thead th.mth.past{background:#3d1a1a !important;color:#ffaaaa !important}
/* TYPE GROUP HEADER */
.type-group-row td{background:#e8f0f8;font-weight:700;font-size:11px;color:var(--accent2);padding:6px 10px;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--border2);border-top:2px solid var(--border2)}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:nth-child(even):not(.type-group-row){background:#eef5fc}
tbody tr:hover:not(.type-group-row){background:#dbeeff}
tbody td{padding:7px 10px;white-space:nowrap;color:var(--text);border-right:1px solid var(--border);font-size:12px}
.n{font-family:var(--mono);text-align:right;font-size:11.5px}
.nb{color:var(--accent);font-weight:600}.nr{color:var(--red);font-weight:700}.na{color:var(--amber);font-weight:600}.nd{color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.bbl{background:var(--red-bg);color:var(--red)}.bok{background:var(--green-bg);color:var(--green)}
.btyp{background:#fef9c3;color:#854d0e;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700}
tfoot tr{position:sticky;bottom:0}
tfoot td{background:#e4f2ff;padding:7px 10px;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--accent2);text-align:right;border-top:2px solid #9fc3e0;border-right:1px solid var(--border)}
tfoot td:first-child{text-align:left;font-family:var(--sans);font-size:11px;color:var(--accent)}
.hidden{display:none !important}
.empty{padding:60px;text-align:center;color:var(--text3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">T</div>
    <div class="logo-text">Tereos <span>FKS</span></div>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-sub">Sales Data Forecast</div>

</div>

<!-- PRODUCT TABS — dynamically populated -->
<div class="prod-tabs" id="prodTabs"></div>

<!-- UPLOAD -->
<div id="uploadSection">
  <div class="upload-card" id="dz" onclick="document.getElementById('fi').click()">
    <input type="file" id="fi" accept=".csv,.xlsx,.xls" onchange="handleFile(this.files[0])">
    <div class="upload-icon">☁️</div>
    <div class="upload-title">Upload File Export Power BI</div>
    <div class="upload-sub">1 file Excel — semua produk dalam 1 sheet<br><a onclick="event.stopPropagation()">atau klik untuk browse</a></div>
  </div>
  <div style="text-align:center;margin-top:14px">
    <button class="demo-btn" onclick="loadDemo()">▶ Lihat demo data</button>
  </div>
</div>

<!-- APP -->
<div id="appSection" class="hidden">
  <div class="filters-bar">
    <div style="display:flex;align-items:center;gap:6px"><span class="flabel">Status</span><select id="fS" onchange="render()"><option value="">All</option></select></div>
    <div style="display:flex;align-items:center;gap:6px"><span class="flabel">Sales</span><select id="fSl" onchange="render()"><option value="">All</option></select></div>
    <div style="display:flex;align-items:center;gap:6px"><span class="flabel">SC No</span><input type="text" id="fSC" placeholder="Search SC Number..." oninput="render()" style="width:160px"></div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button onclick="doExport()" class="btn btn-primary" style="font-size:11px;padding:6px 14px">↓ Export Excel</button>
      <input type="text" id="sq" placeholder="🔍 Search customer..." oninput="render()" style="width:180px">
    </div>
  </div>
  <!-- SUB TABS -->
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0">
    <div id="stab-main" onclick="switchSubTab('main')"
      style="padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid var(--accent);color:var(--accent);font-family:var(--sans)">
      📊 Main
    </div>
    <div id="stab-adj" onclick="switchSubTab('adjusted')"
      style="padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-family:var(--sans)">
      🔧 Adjusted
    </div>
  </div>
  <div class="stats-row" id="stats"></div>
  <div class="table-wrap">
    <table><thead id="th"></thead><tbody id="tb"></tbody><tfoot id="tf"></tfoot></table>
  </div>
</div>

<script>
var allRaw = [];
var idrRaw = [];
var curProd = '';
var curSubTab = 'main'; // 'main' or 'adjusted'
var products = [];
var sortCol = null, sortDir = 1;

// USD column keys
var K = {
  prod:   'Contract[10. Product]',
  stat:   'Contract[30. STATUS CONTRACT]',
  type:   'Contract[12. Contract type]',
  exw:    'Contract[17. EXW (USD/MT)1]',
  up:     'Contract[15. Unit Price]',
  dpMonth:'Contract[32. DP Month]',
  cust:   'Contract[6. CUSTOMER NAME]',
  scNo:   'Contract[Contract Number USD]',
  scNoAlt:'Contract[1. Contract number]',
  sales:  'Contract[8. Sales Name]',
  vf:     '[Volume_Fixations__mt_]',
  qty:    '[Sumv33__SC_Qty]',
};

// IDR column keys — EXACT names confirmed
var KI = {
  prod:    'Contract[10. Product]',
  stat:    'Contract[30. STATUS CONTRACT]',
  type:    'Contract[12. Contract type]',
  exwIDR:  'Contract[16. EXW (IDR/KG)1]',
  exwUSD:  'Contract[17. EXW (USD/MT)1]',
  up:      'Contract[15. Unit Price]',
  dpMonth: 'Contract[32. DP Month]',
  cust:    'Contract[6. CUSTOMER NAME]',
  scNo:    'Contract[1. Contract number]',
  sales:   'Contract[8. Sales Name]',
  scQty:   '[Sumv33__SC_Qty]',          // SC Qty
  bal:     'Outstanding IDR',            // Balance Contract — correct column (no brackets)
  balAlt:  '[Outstanding_IDR]',          // fallback with brackets
  sumSO:   '[SumSO_from_SR]',           // Sum of SO
};

// Type classification
function classifyType(val) {
  val = String(val||'').toLowerCase();
  if (val.indexOf('usd to be converted') >= 0 || val === 'usd to be converted in idr') return 'USD';
  if (val.indexOf('idr 2') >= 0 || val === 'idr 2') return 'IDR 2';
  if (val.indexOf('idr') >= 0) return 'IDR 1';
  if (val === 'usd') return 'USD';
  return val.toUpperCase() || 'USD';
}

var TYPE_ORDER = ['USD','IDR 1','IDR 2'];

function g(row, key, alt) {
  var v = row[key];
  if (v !== undefined && v !== '') return v;
  if (alt) { v = row[alt]; if (v !== undefined && v !== '') return v; }
  return '';
}
function N(v) { var x=parseFloat(v); return isNaN(x)?0:x; }
function F(v,d) { var x=parseFloat(v); if(!x&&x!==0)return'-'; if(!x)return'-'; d=d||0; return x.toLocaleString('id-ID',{maximumFractionDigits:d}); }
function FP(v) { var x=parseFloat(v); if(!x)return'-'; return x.toLocaleString('en-US',{minimumFractionDigits:3,maximumFractionDigits:3}); }
function mN(m) {
  var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var p=m.split('-'); return (2000+parseInt(p[1]))*12+ms.indexOf(p[0]);
}
function parseDPMonth(val) {
  if (val===null||val===undefined||val==='') return null;
  var ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (val instanceof Date) return ms[val.getMonth()]+'-'+String(val.getFullYear()).slice(-2);
  var n=parseFloat(val);
  if (!isNaN(n)&&n>40000&&n<65000) {
    var d=new Date(new Date(1899,11,30).getTime()+n*86400000);
    return ms[d.getMonth()]+'-'+String(d.getFullYear()).slice(-2);
  }
  var s=String(val).trim();
  var m2=s.match(/^(\d{4})[\/\-](\d{1,2})/);
  if (m2){var mo2=parseInt(m2[2])-1;if(mo2>=0&&mo2<12)return ms[mo2]+'-'+m2[1].slice(-2);}
  var m1=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m1){var mo=parseInt(m1[2])-1;var yr=m1[3].length===2?'20'+m1[3]:m1[3];if(mo>=0&&mo<12)return ms[mo]+'-'+yr.slice(-2);}
  if (/^[A-Z][a-z]{2}-\d{2}$/.test(s)) return s;
  return null;
}

// Drag drop
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0])});

function handleFile(file) {
  if (!file) return;
  var reader=new FileReader();
  reader.onload=function(e) {
    var wb=XLSX.read(e.target.result,{type:'binary'});
    var names=wb.SheetNames;

    // Find USD and IDR sheets by name or content
    var usdSheet=names.find(function(n){return /^usd$/i.test(n.trim());}) ||
                 names.find(function(n){return /usd/i.test(n);});
    var idrSheet=names.find(function(n){return /^idr$/i.test(n.trim());}) ||
                 names.find(function(n){return /idr/i.test(n);});

    // Fallback: scan by content
    if (!usdSheet||!idrSheet) {
      names.forEach(function(n){
        var raw=XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:'',header:1});
        var hi=findHeaderRow(raw);
        if(hi<0)return;
        var headers=raw[hi];
        var hasContractNumUSD=headers.indexOf('Contract[Contract Number USD]')>=0;
        var hasIDREXW=headers.indexOf('Contract[16. EXW (IDR/KG)1]')>=0;
        if(hasContractNumUSD&&!usdSheet)usdSheet=n;
        else if(hasIDREXW&&!idrSheet)idrSheet=n;
        else if(hi>=0&&!usdSheet)usdSheet=n; // first valid sheet
      });
    }

    allRaw=usdSheet?parseSheetByName(wb,usdSheet):[];
    idrRaw=idrSheet?parseSheetByName(wb,idrSheet):[];

    // Collect products from both sheets
    var pSet={};
    allRaw.forEach(function(r){var p=g(r,K.prod,'Product');if(p)pSet[p]=1;});
    idrRaw.forEach(function(r){var p=g(r,KI.prod,'Product');if(p)pSet[p]=1;});
    products=Object.keys(pSet).sort();

    if(products.length===0){
      alert('Tidak ada data ditemukan. Pastikan file punya sheet USD dan IDR dengan kolom Contract[6. CUSTOMER NAME] dll');
      return;
    }
    buildTabs();
    switchProd(products[0]);
  };
  reader.readAsBinaryString(file);
}

function parseSheetByName(wb,sheetName){
  var raw=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:'',header:1});
  var hi=findHeaderRow(raw);
  if(hi<0)return[];
  return parseSheet(raw,hi);
}

function findHeaderRow(raw) {
  for (var i=0;i<Math.min(10,raw.length);i++) {
    var joined=raw[i].join('|');
    if (joined.indexOf('Contract[')>=0||joined.indexOf('CUSTOMER NAME')>=0) return i;
  }
  return -1;
}

function parseSheet(raw,headerIdx) {
  var headers=raw[headerIdx];
  return raw.slice(headerIdx+1)
    .filter(function(r){return r.some(function(v){return v!==''&&v!==null&&v!==undefined;});})
    .map(function(r){
      var obj={};
      headers.forEach(function(h,i){if(h!==null&&h!==undefined&&h!=='')obj[h]=(r[i]!==undefined&&r[i]!==null)?r[i]:'';});
      return obj;
    });
}

function loadData(data) {
  allRaw=data;
  idrRaw=[];
  var pSet={};
  data.forEach(function(r){var p=g(r,K.prod,'Product');if(p)pSet[p]=1;});
  products=Object.keys(pSet).sort();
  buildTabs();
  if (products.length>0) switchProd(products[0]);
}

function buildTabs() {
  var tabs=document.getElementById('prodTabs');
  tabs.innerHTML='';
  products.forEach(function(p) {
    var el=document.createElement('div');
    el.className='prod-tab';
    el.textContent=p.replace('_',' ');
    el.setAttribute('data-prod',p);
    el.onclick=function(){switchProd(p);};
    tabs.appendChild(el);
  });
}

function switchProd(p) {
  curProd=p;
  document.querySelectorAll('.prod-tab').forEach(function(t){
    t.classList.toggle('active',t.getAttribute('data-prod')===p);
  });
  // Get rows for this product
  var rows=allRaw.filter(function(r){return g(r,K.prod,'Product')===p;});
  populateFilters(rows);
  document.getElementById('uploadSection').classList.add('hidden');
  document.getElementById('appSection').classList.remove('hidden');
  sortCol=null;
  render();
}

function getUSDRows() {
  return allRaw.filter(function(r){
    if(g(r,K.prod,'Product')!==curProd) return false;
    var stat=String(g(r,K.stat)||'').toLowerCase().trim();
    // Only Progress/Order rows — NOT Cancelled/Completed/Closed
    return stat!=='cancelled' && stat!=='completed' && stat!=='closed' &&
           stat.indexOf('cancel')<0 && stat.indexOf('complet')<0 && stat.indexOf('clos')<0;
  });
}

function getIDR1Rows() {
  // IDR 1: keep Order and Progress — exclude Cancelled/Completed/Closed
  var rows = idrRaw.filter(function(r){
    if(g(r,KI.prod,'Product')!==curProd) return false;
    var stat=String(g(r,KI.stat)||'').toLowerCase().trim();
    // Include: order, progress, or anything that's NOT cancelled/completed/closed
    var isBad = stat==='cancelled'||stat==='completed'||stat==='closed'||
                stat.indexOf('cancel')>=0||stat.indexOf('complet')>=0||stat.indexOf('clos')>=0;
    return !isBad;
  }).sort(function(a,b){
    return String(g(a,KI.cust)||'').localeCompare(String(g(b,KI.cust)||''));
  });
  return rows;
}

function getIDR2Rows() {
  // IDR sheet: Cancelled/Completed/Closed with SO not 0
  return idrRaw.filter(function(r){
    if(g(r,KI.prod,'Product')!==curProd) return false;
    var stat=String(g(r,KI.stat)||'').toLowerCase();
    var isBadStatus=stat==='cancelled'||stat==='completed'||stat==='closed'||
                    stat.indexOf('cancel')>=0||stat.indexOf('complet')>=0||stat.indexOf('clos')>=0;
    if(!isBadStatus) return false;
    // SumSO_from_SR not 0 or blank
    var so=N(g(r,KI.sumSO));  // [SumSO_from_SR]
    return so!==0;
  }).sort(function(a,b){
    return String(g(a,KI.cust)||'').localeCompare(String(g(b,KI.cust)||''));
  });
}

function getRows() { return getUSDRows(); }

function populateFilters(rows) {
  function pop(id,vals) {
    var el=document.getElementById(id);
    var cur=el.value;
    var uniq=[];
    vals.forEach(function(v){if(v&&uniq.indexOf(v)<0)uniq.push(v);});
    uniq.sort();
    el.innerHTML='<option value="">All</option>'+uniq.map(function(v){return'<option'+(v===cur?' selected':'')+'>'+v+'</option>';}).join('');
  }
  pop('fS', rows.map(function(r){return g(r,K.stat,'Status');}));
  // Sales from USD + IDR combined
  var allSales=rows.map(function(r){return g(r,K.sales,'Sales Name');});
  idrRaw.filter(function(r){return g(r,KI.prod)===curProd;}).forEach(function(r){
    var s=g(r,KI.sales,'Sales Name');if(s)allSales.push(s);
  });
  pop('fSl', allSales);
}

function getFiltered() {
  var fS =document.getElementById('fS').value;
  var fSl=document.getElementById('fSl').value;
  var fSC=document.getElementById('fSC').value.toLowerCase().trim();
  var q  =document.getElementById('sq').value.toLowerCase();
  return getUSDRows().filter(function(row){
    if(fS &&g(row,K.stat)!==fS) return false;
    if(fSl&&g(row,K.sales)!==fSl) return false;
    if(fSC){var sc=String(g(row,K.scNoAlt)||g(row,K.scNo)||'').toLowerCase();if(sc.indexOf(fSC)<0)return false;}
    if(q) return Object.values(row).some(function(v){return String(v).toLowerCase().indexOf(q)>=0;});
    return true;
  });
}

function filterBySearch(rows, salesKey) {
  var fSl=document.getElementById('fSl').value;

function buildSubtotal(cOrder,cMap,allMonths){
  var now2=new Date();
  var cs=now2.toLocaleString('en-US',{month:'short'})+'-'+String(now2.getFullYear()).slice(-2);
  var cn=mN(cs);
  var pm=allMonths.filter(function(m){return mN(m)<cn;});
  var sc=0,bal=0,vari=0,bk=0,mo={};
  allMonths.forEach(function(m){mo[m]=0;});
  cOrder.forEach(function(scNo){
    var e=cMap[scNo];
    var b=e.qty-e.vf;
    var sch=allMonths.reduce(function(s,m){return s+(e.mo[m]||0);},0);
    sc+=e.qty;bal+=b;vari+=(b-sch);bk+=pm.reduce(function(s,m){return s+(e.mo[m]||0);},0);
    allMonths.forEach(function(m){mo[m]+=(e.mo[m]||0);});
  });
  return{sc:sc,bal:bal,vari:vari,bk:bk,mo:mo};
}

// Adjusted months: trim FIFO to match target qty (Sum SC+SO)
// months = {Jan-25: 300, Mar-26: 150, ...}, target = sum sc+so
// Returns new months object with FIFO trimming
function adjustMonths(mo, target, allMonths) {
  if (target <= 0) return {};
  var result = {};
  // Copy months sorted chronologically
  var sorted = allMonths.filter(function(m){ return (mo[m]||0) > 0; });
  var remaining = target;
  // FIFO: fill from earliest month
  sorted.forEach(function(m) {
    if (remaining <= 0) { result[m] = 0; return; }
    var v = mo[m] || 0;
    if (v <= remaining) {
      result[m] = v;
      remaining -= v;
    } else {
      result[m] = remaining;
      remaining = 0;
    }
  });
  return result;
}

      var e=i2CMap[scNo],row=e.row;
      var cust=g(row,KI.cust)||'-',sales=g(row,KI.sales)||'-';
      var up=N(g(row,KI.up)),exwIDR=N(g(row,KI.exwIDR)),exwUSD=N(g(row,KI.exwUSD));
      var dispMo2=curSubTab==='adjusted'?adjustMonths(e.mo,e.so,allMonths):e.mo;
      var mc=mkMcells(dispMo2, exwUSD);
      var bkQ2=pastMo.reduce(function(s,m){return s+(dispMo2[m]||0);},0);
      var isBk2=bkQ2>0;
      gTotScso+=e.so; gTotBk+=bkQ2;
      allMonths.forEach(function(m){gMot[m]+=(dispMo2[m]||0);gVal[m]+=(dispMo2[m]||0)*exwUSD;});
      html+='<tr>'+
        '<td><span class="btyp" style="background:#ede9fe;color:#3730a3">IDR 2</span></td>'+
        '<td style="font-weight:500">'+cust+'</td>'+
        '<td style="font-family:var(--mono);font-size:11px;color:var(--text2)">'+scNo+'</td>'+
        '<td style="font-weight:600;color:var(--accent2)">'+sales+'</td>'+
        '<td class="n nb">'+FP(up)+'</td>'+
        '<td class="n">'+F(exwIDR,0)+'</td>'+
        '<td class="n">'+F(exwUSD,2)+'</td>'+
        '<td class="n nd">—</td>'+
        '<td class="n nd">—</td>'+
        '<td class="n nb">'+F(e.so,2)+'</td>'+
        '<td class="n nd">—</td>'+
        '<td class="n nd">—</td>'+
        '<td style="text-align:center"><span class="badge '+(isBk2?'bbl':'bok')+'">'+(isBk2?'BACKLOG':'OK')+'</span></td>'+
        '<td class="n '+(isBk2?'nr':'nd')+'">'+( isBk2?F(bkQ2,2):'-')+'</td>'+
        mc.tot+mc.cells+mc.vtot+mc.vcells+'</tr>';
    });
  }

  document.getElementById('tb').innerHTML=html||
    '<tr><td colspan="'+(14+(allMonths.length?allMonths.length*2+2:0))+'" class="empty">Tidak ada data untuk produk ini</td></tr>';

  // ── FOOTER ──
  var gT=allMonths.reduce(function(s,m){return s+gMot[m];},0);
  var gTVal=allMonths.reduce(function(s,m){return s+gVal[m];},0);
  var gAvgPrice=gT>0?gTVal/gT:0;
  var avgP2=usdPivot.cOrder.length?usdPivot.cOrder.map(function(sc){return N(g(usdPivot.cMap[sc].row,K.up));}).reduce(function(a,b){return a+b;},0)/usdPivot.cOrder.length:0;
  // Store for renderStats Outstanding
  _pivotCounts.outstanding = gTotScso;
  var fMo=allMonths.length?
    '<td style="'+sep+'">'+(gT?gT.toLocaleString('id-ID'):'-')+'</td>'+
    allMonths.map(function(m,i){var v=gMot[m];return'<td'+(i===0?' style="'+sep+'"':'')+'>'+(v?v.toLocaleString('id-ID'):'-')+'</td>';}).join('')+
    '<td style="'+sep2+'"></td>'+
    allMonths.map(function(m,i){var v=Math.round(gVal[m]);return'<td style="color:#8a6a20;'+(i===0?sep2:'')+'">'+(v?v.toLocaleString('id-ID'):'-')+'</td>';}).join('')
    :'';
  // ── Update sub-total header row ──
  var stTot=document.getElementById('st_tot');
  if(stTot){
    stTot.textContent=gT?gT.toLocaleString('id-ID'):'-';
    allMonths.forEach(function(m){
      var el=document.getElementById('st_'+m.replace('-','_'));
      if(el)el.textContent=gMot[m]?gMot[m].toLocaleString('id-ID'):'-';
      var elv=document.getElementById('stv_'+m.replace('-','_'));
      if(elv){
        // Per-month avg price = total value for month / total qty for month
        var mAvg=gMot[m]>0?(gVal[m]/gMot[m]):0;
        elv.textContent=mAvg?Math.round(mAvg).toLocaleString('id-ID'):'-';
      }
    });
    // Avg Price = per-month: value/qty for each month, shown in the "Avg Price" cell
    // But we only have one avg cell — use overall weighted avg (total value / total qty)
    var avgEl=document.getElementById('st_avg');
    if(avgEl)avgEl.textContent=''; // spacer — no value displayed
  }

  document.getElementById('tf').innerHTML=
    '<tr>'+
    '<td colspan="4">GRAND TOTAL — '+totalContracts+' contracts</td>'+
    '<td style="color:var(--amber)">'+FP(avgP2)+'</td><td>—</td><td>—</td>'+
    '<td>'+F(gTotSC,2)+'</td><td>'+F(gTotBal,2)+'</td><td>—</td><td>'+F(gTotScso,2)+'</td>'+
    '<td style="'+(gTotVar>0?'color:var(--amber)':gTotVar<0?'color:var(--red)':'')+'">'+( gTotVar?F(gTotVar,2):'-')+'</td>'+
    '<td></td><td>'+(gTotBk?F(gTotBk,2):'-')+'</td>'+
    fMo+'</tr>';
}

function doExport() {
  var wb = XLSX.utils.book_new();
  var ms2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var fixedMo = [];
  [25,26].forEach(function(yr){ ms2.forEach(function(m){ fixedMo.push(m+'-'+yr); }); });
  var now2 = new Date();
  var curS2 = now2.toLocaleString('en-US',{month:'short'})+'-'+String(now2.getFullYear()).slice(-2);
  var pastM = fixedMo.filter(function(m){ return mN(m)<mN(curS2); });

  // All columns: fixed + interleaved month qty+value
  var fixCols = ['Type','Customer Name','SC Number','Sales Name',
    'Unit Price','EXW IDR Price','EXW USD Price',
    'SC Qty (mt)','Balance Contract','Sum of SO','Sum SC+SO',
    'Variance','Backlog','Backlog Qty'];
  var allCols = fixCols.slice();
  fixedMo.forEach(function(m){ allCols.push(m); });
  fixedMo.forEach(function(m){ allCols.push(m+' $'); });

  var prevProd = curProd;

  products.forEach(function(prod){
    curProd = prod;
    var wsRows = [allCols];

    function addSection(label){
      var r=allCols.map(function(){return'';}); r[0]=label; wsRows.push(r);
    }

    function buildRow(type,cust,sc,sales,up,exwIDR,exwUSD,qty,bal,so,scso,vari,isBk,bkQ,mo){
      var r=[type,cust,sc,sales,up||'',exwIDR||'',exwUSD||'',qty||'',bal||'',so||'',scso||'',
        vari!==''&&vari!==undefined?vari:'', isBk?'BACKLOG':'OK', bkQ||''];
      fixedMo.forEach(function(m){ r.push(mo[m]||''); });
      fixedMo.forEach(function(m){
        r.push((mo[m]||0)*(exwUSD||0)?Math.round((mo[m]||0)*(exwUSD||0)):'');
      });
      return r;
    }

    // USD
    var uR=getUSDRows(), uCM={}, uCO=[];
    uR.forEach(function(row){
      var sc=g(row,K.scNoAlt)||g(row,K.scNo)||'?';
      var ml=parseDPMonth(g(row,K.dpMonth));
      var qty=N(g(row,K.qty)),vf=N(g(row,K.vf));
      if(!uCM[sc]){uCO.push(sc);uCM[sc]={row:row,qty:0,vf:0,mo:{}};}
      uCM[sc].qty+=qty;uCM[sc].vf+=vf;
      if(ml)uCM[sc].mo[ml]=(uCM[sc].mo[ml]||0)+qty;
    });
    if(uCO.length){
      addSection('USD to be converted in IDR — '+uCO.length+' contracts');
      uCO.forEach(function(sc){
        var e=uCM[sc],row=e.row,bal=e.qty-e.vf;
        var mo=adjustMonths(e.mo,bal,fixedMo);
        var sched=fixedMo.reduce(function(s,m){return s+(mo[m]||0);},0);
        var bkQ=pastM.reduce(function(s,m){return s+(mo[m]||0);},0);
        wsRows.push(buildRow('USD',g(row,K.cust),sc,g(row,K.sales),N(g(row,K.up)),'',N(g(row,K.exw)),e.qty,bal,'',bal,bal-sched,bkQ>0,bkQ,mo));
      });
    }

    // IDR 1
    var i1R=getIDR1Rows(), i1CM={}, i1CO=[];
    i1R.forEach(function(row){
      var sc=g(row,KI.scNo)||'?';
      var ml=parseDPMonth(g(row,KI.dpMonth));
      var qty=N(g(row,KI.scQty));
      if(!i1CM[sc]){i1CO.push(sc);i1CM[sc]={row:row,qty:0,bal:0,so:0,mo:{}};}
      i1CM[sc].qty+=qty;
      i1CM[sc].bal=Math.max(i1CM[sc].bal,N(g(row,KI.bal))||N(g(row,KI.balAlt)));
      i1CM[sc].so =Math.max(i1CM[sc].so, N(g(row,KI.sumSO)));
      if(ml)i1CM[sc].mo[ml]=(i1CM[sc].mo[ml]||0)+qty;
    });
    if(i1CO.length){
      addSection('IDR 1 — '+i1CO.length+' contracts');
      i1CO.forEach(function(sc){
        var e=i1CM[sc],row=e.row,scso=e.bal+e.so;
        var mo=adjustMonths(e.mo,scso,fixedMo);
        var sched=fixedMo.reduce(function(s,m){return s+(mo[m]||0);},0);
        var bkQ=pastM.reduce(function(s,m){return s+(mo[m]||0);},0);
        wsRows.push(buildRow('IDR 1',g(row,KI.cust),sc,g(row,KI.sales),N(g(row,KI.up)),N(g(row,KI.exwIDR)),N(g(row,KI.exwUSD)),e.qty,e.bal,e.so,scso,scso-sched,bkQ>0,bkQ,mo));
      });
    }

    // IDR 2
    var i2R=getIDR2Rows(), i2CM={}, i2CO=[];
    i2R.forEach(function(row){
      var sc=g(row,KI.scNo)||'?';
      var ml=parseDPMonth(g(row,KI.dpMonth));
      var so=N(g(row,KI.sumSO));
      if(!i2CM[sc]){i2CO.push(sc);i2CM[sc]={row:row,so:0,mo:{}};}
      i2CM[sc].so+=so;
      if(ml)i2CM[sc].mo[ml]=(i2CM[sc].mo[ml]||0)+so;
    });
    if(i2CO.length){
      addSection('IDR 2 — '+i2CO.length+' contracts (Cancelled/Completed/Closed with SO)');
      i2CO.forEach(function(sc){
        var e=i2CM[sc],row=e.row;
        var mo=adjustMonths(e.mo,e.so,fixedMo);
        var bkQ=pastM.reduce(function(s,m){return s+(mo[m]||0);},0);
        wsRows.push(buildRow('IDR 2',g(row,KI.cust),sc,g(row,KI.sales),N(g(row,KI.up)),N(g(row,KI.exwIDR)),N(g(row,KI.exwUSD)),'','',e.so,'','',bkQ>0,bkQ,mo));
      });
    }

    curProd=prevProd;
    if(wsRows.length<=1)return;

    // ── SUB-TOTAL ROW (row 1, above header) ──
    var qtyStart = fixCols.length;
    var valStart = fixCols.length + fixedMo.length;
    var subRow = allCols.map(function(){ return ''; });
    subRow[0] = 'TOTAL';
    fixedMo.forEach(function(m, i){
      var qCol = qtyStart + i;
      var vCol = valStart + i;
      var qSum=0, vSum=0;
      for(var ri=1;ri<wsRows.length;ri++){
        var r=wsRows[ri];
        if(!r[1]&&!r[2]) continue; // skip section headers
        qSum+=Number(r[qCol])||0;
        vSum+=Number(r[vCol])||0;
      }
      subRow[qCol] = qSum||'';
      subRow[vCol] = (qSum>0)?Math.round(vSum/qSum):'';
    });
    // Final order: subRow (row 1) → header (row 2) → data rows
    wsRows.unshift(subRow);  // subRow at index 0
    // header was already at index 0, now at index 1
    // data rows start at index 2

    var ws=XLSX.utils.aoa_to_sheet(wsRows);
    var rng=XLSX.utils.decode_range(ws['!ref']);

    // Style: row 0 = sub-total (dark), row 1 = header (navy), row 2+ = data
    for(var ci=0;ci<=rng.e.c;ci++){
      // Sub-total row (row 0)
      var st=ws[XLSX.utils.encode_cell({r:0,c:ci})];
      var cN0=allCols[ci]||'';
      if(st){
        st.s={fill:{fgColor:{rgb:'0D1F35'}},font:{bold:true,color:{rgb:cN0.slice(-2)===' $'?'B8D880':'7EC8F0'}},alignment:{horizontal:'right'}};
        if(st.v) st.z='#,##0';
      }
      // Header row (row 1)
      var hc=ws[XLSX.utils.encode_cell({r:1,c:ci})];
      if(hc)hc.s={fill:{fgColor:{rgb:'1A2F4A'}},font:{bold:true,color:{rgb:'CCE4F8'}},alignment:{horizontal:'center'}};
    }
    // Data rows style (row 2+)
    for(var ri=2;ri<=rng.e.r;ri++){
      var rowArr=wsRows[ri];
      var isSection=rowArr&&rowArr[0]&&!rowArr[1]&&String(rowArr[0]).indexOf(' — ')>=0;
      var isEven=ri%2===0;
      for(var ci2=0;ci2<=rng.e.c;ci2++){
        var addr=XLSX.utils.encode_cell({r:ri,c:ci2});
        if(!ws[addr])ws[addr]={t:'s',v:''};
        var cv=String(ws[addr].v||'');
        var colN=allCols[ci2]||'';
        if(isSection){ws[addr].s={fill:{fgColor:{rgb:'1565C0'}},font:{bold:true,color:{rgb:'FFFFFF'}}};}
        else if(cv==='BACKLOG'){ws[addr].s={fill:{fgColor:{rgb:'FDE8E6'}},font:{bold:true,color:{rgb:'B83228'}}};}
        else if(cv==='OK'){ws[addr].s={fill:{fgColor:{rgb:'D4F0E0'}},font:{bold:true,color:{rgb:'1B6B3A'}}};}
        else if(colN.slice(-2)===' $'){
          ws[addr].s={fill:{fgColor:{rgb:'FDFBF0'}}};
          if(ws[addr].v) ws[addr].z='#,##0';
        }
        else{
          ws[addr].s={fill:{fgColor:{rgb:isEven?'EEF5FC':'FFFFFF'}}};
          if(ci2>=fixCols.length && ws[addr].v) ws[addr].z='#,##0'; // month qty cols
        }
      }
    }
    ws['!cols']=allCols.map(function(_,i){return{wch:i<4?22:i<17?12:9};});
    var sn=prod.replace(/[^a-zA-Z0-9]/g,'_').slice(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sn);
  });

  curProd=prevProd;
  if(!wb.SheetNames.length){alert('Tidak ada data.');return;}
  XLSX.writeFile(wb,'SalesDataForecast_'+new Date().toISOString().slice(0,10)+'.xlsx',{cellStyles:true});
}
