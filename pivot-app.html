<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tereos FKS — Sales Data Forecast</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --surface3: #22272e;
  --border: #30363d;
  --border2: #444c56;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --accent: #3fb950;
  --accent2: #2ea043;
  --accent-dim: rgba(63,185,80,0.12);
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.12);
  --blue: #58a6ff;
  --blue-dim: rgba(88,166,255,0.12);
  --amber: #d29922;
  --amber-dim: rgba(210,153,34,0.12);
  --backlog-bg: #3d1a1a;
  --backlog-text: #ff7b72;
  --ok-bg: #1a3d2b;
  --ok-text: #56d364;
  --header-bg: #1f2937;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Syne', sans-serif;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

/* ── TOPBAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.logo span { color: var(--accent); }
.topbar-sep { width: 1px; height: 18px; background: var(--border); }
.topbar-sub { font-size: 12px; color: var(--text2); font-weight: 300; }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ── PAGE TABS ── */
.page-tabs {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.page-tab {
  padding: 10px 18px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--display);
  letter-spacing: 0.02em;
}
.page-tab:hover { color: var(--text); }
.page-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 99px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: var(--mono);
}

/* ── UPLOAD ── */
#uploadSection { padding: 40px 20px; }
.upload-card {
  max-width: 560px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px dashed var(--border2);
  border-radius: 12px;
  padding: 48px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.upload-card:hover, .upload-card.drag { border-color: var(--accent); background: var(--accent-dim); }
.upload-card input { display: none; }
.upload-icon { font-size: 36px; margin-bottom: 14px; }
.upload-title { font-family: var(--display); font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.upload-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }
.upload-sub a { color: var(--accent); cursor: pointer; }
.demo-btn {
  margin-top: 20px;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}
.demo-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── FILTERS ── */
.filters-bar {
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
select, input[type=text] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: var(--sans);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
select:focus, input[type=text]:focus { border-color: var(--accent); }
select { cursor: pointer; }

/* ── PIVOT TABS ── */
.pivot-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 20px 0;
  background: var(--bg);
}
.pivot-tab {
  padding: 7px 14px;
  border-radius: 6px 6px 0 0;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom: none;
  transition: all 0.15s;
  font-family: var(--display);
}
.pivot-tab.active { background: var(--surface); color: var(--text); border-color: var(--border2); }
.pivot-tab:hover:not(.active) { color: var(--text); }

/* ── STATS ── */
.stats-row {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  flex: 1;
  background: var(--surface2);
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.stat-label { font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; }
.stat-val { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.stat-val.green { color: var(--accent); }
.stat-val.red { color: var(--red); }
.stat-val.blue { color: var(--blue); }
.stat-val.amber { color: var(--amber); }

/* ── TABLE ── */
.table-wrap {
  overflow: auto;
  max-height: calc(100vh - 260px);
  background: var(--surface);
  border-top: 1px solid var(--border);
}
table { width: 100%; border-collapse: collapse; min-width: 800px; }

thead th {
  background: #1f2937;
  color: #94a3b8;
  padding: 8px 12px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  position: sticky;
  top: 0;
  z-index: 10;
  white-space: nowrap;
  border-right: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  font-family: var(--display);
}
thead th:hover { background: #263347; color: var(--text); }
thead th.sorted { color: var(--accent); }
.sort-icon { margin-left: 4px; opacity: 0.5; font-size: 9px; }
thead th.sorted .sort-icon { opacity: 1; }

/* month header */
thead th.month-col {
  background: #1a2535;
  text-align: right;
  font-size: 9px;
  padding: 8px 8px;
  min-width: 60px;
}
thead th.month-col.recent { background: #1f2d1f; color: #6ee7b7; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody td {
  padding: 7px 12px;
  white-space: nowrap;
  color: var(--text);
  border-right: 1px solid rgba(255,255,255,0.04);
  font-size: 12.5px;
}
.num { font-family: var(--mono); text-align: right; font-size: 12px; color: #a8c8e8; }
.num.zero { color: var(--text3); }
.num.high { color: var(--accent); font-weight: 500; }

/* status badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  font-family: var(--mono);
}
.badge-backlog { background: var(--backlog-bg); color: var(--backlog-text); }
.badge-ok { background: var(--ok-bg); color: var(--ok-text); }
.badge-completed { background: var(--blue-dim); color: var(--blue); }
.badge-cancelled { background: var(--amber-dim); color: var(--amber); }

/* grand total row */
tfoot tr { position: sticky; bottom: 0; }
tfoot td {
  background: #1f2d1f;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  text-align: right;
  border-top: 2px solid var(--accent2);
  border-right: 1px solid rgba(255,255,255,0.06);
}
tfoot td:first-child { text-align: left; font-family: var(--display); font-size: 11px; letter-spacing: 0.04em; }
tfoot td.avg-cell { color: var(--amber); }

/* AVG row */
.avg-row td {
  background: #1f2820 !important;
  color: var(--amber) !important;
  font-family: var(--mono) !important;
  font-size: 11px !important;
  text-align: right;
  border-top: 1px dashed var(--border2);
  padding: 5px 12px !important;
}
.avg-row td:first-child { color: var(--text2) !important; text-align: left; font-size: 10px !important; letter-spacing: 0.06em; }

/* BUTTONS */
.btn {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--accent2); color: white; }
.btn-primary:hover { background: var(--accent); }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

.hidden { display: none !important; }

/* EMPTY */
.empty-state { padding: 60px; text-align: center; color: var(--text3); font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Tereos <span>FKS</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-sub">Sales Data Forecast</div>
  <div class="topbar-right">
    <button class="btn btn-outline" id="exportBtn1" onclick="exportPivot1()" style="display:none">↓ Export Pivot 1</button>
    <button class="btn btn-primary" id="exportBtn2" onclick="exportPivot2()" style="display:none">↓ Export Pivot 2 (Monthly)</button>
  </div>
</div>

<div class="page-tabs">
  <div class="page-tab active" onclick="switchPage('usd')">
    💵 USD <span class="tab-badge">Page 1</span>
  </div>
  <div class="page-tab" onclick="switchPage('idr')">
    🇮🇩 IDR <span class="tab-badge">Page 2</span>
  </div>
</div>

<!-- UPLOAD -->
<div id="uploadSection">
  <div class="upload-card" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFile(this.files[0])">
    <div class="upload-icon">📂</div>
    <div class="upload-title">Upload File dari Power BI</div>
    <div class="upload-sub">Export CSV atau Excel dari Power BI, lalu drop di sini<br><a onclick="event.stopPropagation()">atau klik untuk pilih file</a></div>
  </div>
  <div style="text-align:center;margin-top:16px;">
    <button class="demo-btn" onclick="loadDemo()">▶ Coba dengan demo data (USD)</button>
  </div>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

  <div class="filters-bar" id="filtersBar">
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <select id="fStatus" onchange="render()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Product</span>
      <select id="fProduct" onchange="render()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Sales</span>
      <select id="fSales" onchange="render()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Cust. Group</span>
      <select id="fGroup" onchange="render()"><option value="">All</option></select>
    </div>
    <div class="filter-group" style="margin-left:auto">
      <input type="text" id="searchBox" placeholder="🔍 Search..." oninput="render()" style="width:180px">
    </div>
  </div>

  <div class="pivot-tabs">
    <div class="pivot-tab active" id="ptab1" onclick="switchPivot(1)">Pivot 1 — Summary</div>
    <div class="pivot-tab" id="ptab2" onclick="switchPivot(2)">Pivot 2 — Qty per Month</div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="table-wrap" id="tableWrap">
    <table id="mainTable">
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
      <tfoot id="tFoot"></tfoot>
    </table>
  </div>
</div>

<script>
let allData = [];
let currentPage = 'usd';
let currentPivot = 1;
let sortCol = null, sortDir = 1;

// ── COLUMN MAPS ──
// These column names match what Power BI exports.
// Users can adjust if their export columns differ.
const COL = {
  customer:    ['Contract[6. CUSTOMER NAME]', 'Customer Name', 'CUSTOMER NAME'],
  contractNum: ['Contract[1. Contract number]', 'Main Contract Number', 'Contract Number', 'SC NUMBER', 'Contract number'],
  sales:       ['Contract[8. Sales Name]', 'Sales Name', 'SALES NAME'],
  unitPrice:   ['Contract[15. Unit Price]', 'Unit Price ($/KG)', 'UNIT PRICE', 'Unit Price'],
  exw:         ['Contract[17. EXW (USD/MT)1]', 'EXW ($/MT)', 'EXW USD PRICE', 'EXW USD Price'],
  exwIdr:      ['Contract[16. EXW (IDR/KG)', 'EXW (IDR/KG)', 'EXW IDR PRICE', 'EXW IDR Price'],
  scQty:       ['SC Qty', 'Contract Qty (mt)', 'Sum of SC (mt)', 'Contract Qty'],
  volFix:      ['Vol Fixations', 'Volume Fixations (mt)', 'Sum of BALANCE CONTRACT'],
  outstanding: ['Outstanding', 'Outstanding Contract (mt)', 'Sum of SC+SO'],
  soCreated:   ['SO Created (mt)', 'Sum of SO'],
  status:      ['Contract[30. STATUS CONTRACT]', 'Status', 'STATUS CONTRACT', 'Backlog'],
  product:     ['Contract[10. Product]', 'Product', 'PRODUCT'],
  custGroup:   ['Customer Group', 'Contract[6. Customer Group]'],
  dpMonth:     ['Contract[32. DP Month]', 'DP Month'],
  type:        ['Type', 'Contract[12. Contract type]', 'Contract type'],
};

function pick(row, keys) {
  for (const k of keys) if (row[k] !== undefined && row[k] !== '') return row[k];
  return '';
}

// ── DRAG & DROP ──
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    // Try to find USD sheet
    const sheetName = wb.SheetNames.find(s => /usd/i.test(s)) || wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
    loadData(json);
  };
  reader.readAsBinaryString(file);
}

function loadDemo() {
  // Demo data based on screenshots
  const months = ['Jan-25','Feb-25','Mar-25','Apr-25','May-25','Jun-25','Jul-25','Aug-25','Sep-25','Oct-25','Nov-25','Dec-25','Jan-26','Feb-26','Mar-26'];
  const demo = [

    { customer:'PT ALAM MANIS INDONESIA', contractNum:'124/SC/GC/VIII/2024', sales:'EMILIA', unitPrice:0.432, exw:432, scQty:550, volFix:100, outstanding:450, status:'Active', product:'GLUCOSE', custGroup:'ALAM MANIS', monthQtys: {'Feb-25':183,'Mar-25':183,'Apr-25':183} },

    { customer:'PT FONUSA AGUNG MULIA', contractNum:'059/SC/GC/VIII/2025', sales:'RINA', unitPrice:0.483, exw:475.68, scQty:2745, volFix:400, outstanding:2345, status:'Active', product:'GLUCOSE', custGroup:'FONUSA GROUP', monthQtys: {'Sep-25':305,'Oct-25':305,'Nov-25':305,'Dec-25':305,'Jan-26':305,'Feb-26':305,'Mar-26':305,'Apr-26':305,'May-26':305} },
    { customer:'PT KALDU SARI NABATI INDONESIA', contractNum:'006/SC/GC/I/2026', sales:'RINA', unitPrice:0.59, exw:565.0, scQty:200, volFix:100, outstanding:200, status:'Active', product:'GLUCOSE', custGroup:'KALDU GROUP', monthQtys: {'Nov-25':100,'Dec-25':100} },
    { customer:'PT KALDU SARI NABATI INDONESIA', contractNum:'045/SC/GC/VII/2025', sales:'MARIO', unitPrice:0.48, exw:464.74, scQty:250, volFix:49, outstanding:201, status:'Active', product:'GLUCOSE', custGroup:'KALDU GROUP', monthQtys: {'Feb-25':90,'Aug-25':80,'Sep-25':80} },

    { customer:'PT KALDU SARI NABATI INDONESIA', contractNum:'057/SC/GC/VIII/2025', sales:'RINA', unitPrice:0.555, exw:529.98, scQty:375, volFix:136, outstanding:239, status:'Active', product:'GLUCOSE', custGroup:'KALDU GROUP', monthQtys: {'Sep-25':87,'Oct-25':96,'Nov-25':96,'Dec-25':96} },
    { customer:'PT KALDU SARI NABATI INDONESIA', contractNum:'076/SC/GC/XII/2025', sales:'RINA', unitPrice:0.53, exw:514.99, scQty:100, volFix:75, outstanding:25, status:'Active', product:'GLUCOSE', custGroup:'KALDU GROUP', monthQtys: {'Oct-25':100} },

    { customer:'PT KIEVIT INDONESIA', contractNum:'002/SC/GC/I/2026', sales:'RINA', unitPrice:0.485, exw:459.97, scQty:500, volFix:90, outstanding:410, status:'Active', product:'GLUCOSE', custGroup:'KIEVIT GROUP', monthQtys: {'Jan-26':50,'Feb-26':50,'Mar-26':50,'Apr-26':50,'May-26':50,'Jun-26':50,'Jul-26':50,'Aug-26':50,'Sep-26':100} },
    { customer:'PT LAUTAN NATURAL KRIMERINDO', contractNum:'036/SC/GC/VI/2025', sales:'EMILIA', unitPrice:0.41, exw:385.43, scQty:3000, volFix:2550, outstanding:450, status:'Active', product:'GLUCOSE', custGroup:'LAUTAN GROUP', monthQtys: {'Aug-25':500,'Sep-25':500,'Oct-25':500,'Nov-25':500,'Dec-25':500,'Jan-26':500} },
    { customer:'WINGS GROUP', contractNum:'026/SC/GC/IV/2025', sales:'RINA', unitPrice:0.372, exw:372, scQty:9960, volFix:0, outstanding:7040, status:'Active', product:'GLUCOSE', custGroup:'WINGS GROUP', monthQtys: {'Jun-25':2429,'Jul-25':2429,'Aug-25':2429,'Sep-25':2429} },
    { customer:'WINGS GROUP', contractNum:'053/SC/GC/VIII/2025', sales:'RINA', unitPrice:0.379, exw:379, scQty:8730, volFix:0, outstanding:3270, status:'Active', product:'GLUCOSE', custGroup:'WINGS GROUP', monthQtys: {'Sep-25':1000,'Oct-25':1000,'Nov-25':1000,'Dec-25':270} },
  ];

  // Flatten to row format
  const allMonths = ['Jan-25','Feb-25','Mar-25','Apr-25','May-25','Jun-25','Jul-25','Aug-25','Sep-25','Oct-25','Nov-25','Dec-25','Jan-26','Feb-26','Mar-26','Apr-26','May-26','Jun-26','Jul-26','Aug-26','Sep-26'];
  const flat = demo.map(d => {
    const row = {
      'Contract[6. CUSTOMER NAME]': d.customer,
      'Contract[1. Contract number]': d.contractNum,
      'Contract[8. Sales Name]': d.sales,
      'Contract[15. Unit Price]': d.unitPrice,
      'Contract[17. EXW (USD/MT)1]': d.exw,
      'SC Qty': d.scQty,
      'Vol Fixations': d.volFix,
      'Outstanding': d.outstanding,
      'Contract[30. STATUS CONTRACT]': d.status,
      'Contract[10. Product]': d.product,
      'Customer Group': d.custGroup,
    };
    allMonths.forEach(m => { row[m] = d.monthQtys[m] || 0; });
    return row;
  });

  window._monthCols = allMonths;
  loadData(flat);
}

function loadData(data) {
  allData = data;

  // Detect month columns: columns that look like "Mon-YY"
  const cols = Object.keys(data[0] || {});
  if (!window._monthCols) {
    window._monthCols = cols.filter(c => /^[A-Z][a-z]{2}-\d{2}$/.test(c));
  }

  // Populate filters
  populateFilter('fStatus', data.map(r => pick(r, COL.status)));
  populateFilter('fProduct', data.map(r => pick(r, COL.product)));
  populateFilter('fSales', data.map(r => pick(r, COL.sales)));
  populateFilter('fGroup', data.map(r => pick(r, COL.custGroup)));

  document.getElementById('uploadSection').classList.add('hidden');
  document.getElementById('appSection').classList.remove('hidden');
  document.getElementById('exportBtn1').style.display = '';
  document.getElementById('exportBtn2').style.display = '';
  render();
}

function populateFilter(id, vals) {
  const el = document.getElementById(id);
  const unique = [...new Set(vals.filter(Boolean))].sort();
  el.innerHTML = '<option value="">All</option>' + unique.map(v => `<option>${v}</option>`).join('');
}

function getFiltered() {
  const s = v => document.getElementById(v).value;
  const search = s('searchBox').toLowerCase();
  return allData.filter(row => {
    if (s('fStatus') && pick(row, COL.status) !== s('fStatus')) return false;
    if (s('fProduct') && pick(row, COL.product) !== s('fProduct')) return false;
    if (s('fSales') && pick(row, COL.sales) !== s('fSales')) return false;
    if (s('fGroup') && pick(row, COL.custGroup) !== s('fGroup')) return false;
    if (search) return Object.values(row).some(v => String(v).toLowerCase().includes(search));
    return true;
  });
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmt(v, dec=2) {
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '-';
  return n.toLocaleString('id-ID', { minimumFractionDigits: dec > 2 ? 0 : 0, maximumFractionDigits: dec });
}
function fmtPrice(v) {
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '-';
  return n.toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}

let _sortedData = [];

function render() {
  let data = getFiltered();
  if (sortCol !== null) {
    data = [...data].sort((a, b) => {
      const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });
  }
  _sortedData = data;

  renderStats(data);
  if (currentPivot === 1) renderPivot1(data);
  else renderPivot2(data);
}

function renderStats(data) {
  const months = window._monthCols || [];
  const totalSC = data.reduce((s, r) => s + num(pick(r, COL.scQty)), 0);
  const totalVol = data.reduce((s, r) => s + num(pick(r, COL.volFix)), 0);
  const totalOut = data.reduce((s, r) => s + num(pick(r, COL.outstanding)), 0);
  const avgPrice = data.length ? data.reduce((s,r)=>s+num(pick(r,COL.unitPrice)),0)/data.length : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-cell"><span class="stat-label">Contracts</span><span class="stat-val blue">${data.length}</span></div>
    <div class="stat-cell"><span class="stat-label">Total SC Qty (mt)</span><span class="stat-val">${totalSC.toLocaleString('id-ID')}</span></div>
    <div class="stat-cell"><span class="stat-label">Vol Fixations (mt)</span><span class="stat-val amber">${totalVol.toLocaleString('id-ID')}</span></div>
    <div class="stat-cell"><span class="stat-label">Outstanding (mt)</span><span class="stat-val red">${totalOut.toLocaleString('id-ID')}</span></div>
    <div class="stat-cell"><span class="stat-label">Avg Unit Price ($/kg)</span><span class="stat-val green">${avgPrice.toFixed(3)}</span></div>
  `;
}

// ── PIVOT 1: SUMMARY ──
function renderPivot1(data) {
  const cols = [
    { key: 'customer', label: 'Customer Name', w: 220 },
    { key: 'contractNum', label: 'Contract Number', w: 180 },
    { key: 'sales', label: 'Sales', w: 90 },
    { key: 'product', label: 'Product', w: 120 },
    { key: 'status', label: 'Status', w: 110 },
    { key: 'unitPrice', label: 'Unit Price ($/KG)', w: 100, num: true },
    { key: 'exw', label: 'EXW ($/MT)', w: 90, num: true },
    { key: 'scQty', label: 'SC Qty (mt)', w: 90, num: true },
    { key: 'volFix', label: 'Vol Fixations (mt)', w: 110, num: true },
    { key: 'outstanding', label: 'Outstanding (mt)', w: 110, num: true },
  ];

  // HEAD
  document.getElementById('tHead').innerHTML = `<tr>${cols.map(c =>
    `<th onclick="doSort('${c.key}')" class="${sortCol===c.key?'sorted':''}" style="min-width:${c.w||100}px">
      ${c.label}<span class="sort-icon">${sortCol===c.key?(sortDir===1?'▲':'▼'):'⇅'}</span>
    </th>`
  ).join('')}</tr>`;

  // BODY
  let html = '';
  data.forEach(row => {
    const status = pick(row, COL.status);
    const badgeCls = /active|outstanding/i.test(status) ? 'badge-backlog' :
                     /complet/i.test(status) ? 'badge-completed' :
                     /cancel/i.test(status) ? 'badge-cancelled' : 'badge-ok';
    const out = num(pick(row, COL.outstanding));
    html += `<tr>
      <td>${pick(row, COL.customer) || '-'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${pick(row, COL.contractNum) || '-'}</td>
      <td>${pick(row, COL.sales) || '-'}</td>
      <td style="color:var(--blue);font-size:11px">${pick(row, COL.product) || '-'}</td>
      <td><span class="badge ${badgeCls}">${status || '-'}</span></td>
      <td class="num">${fmtPrice(pick(row, COL.unitPrice))}</td>
      <td class="num">${fmt(pick(row, COL.exw))}</td>
      <td class="num">${fmt(pick(row, COL.scQty), 0)}</td>
      <td class="num">${fmt(pick(row, COL.volFix), 0)}</td>
      <td class="num ${out > 0 ? 'high' : 'zero'}">${fmt(out, 0)}</td>
    </tr>`;
  });
  document.getElementById('tBody').innerHTML = html || `<tr><td colspan="10" class="empty-state">Tidak ada data</td></tr>`;

  // FOOT
  const totSC = data.reduce((s,r)=>s+num(pick(r,COL.scQty)),0);
  const totVol = data.reduce((s,r)=>s+num(pick(r,COL.volFix)),0);
  const totOut = data.reduce((s,r)=>s+num(pick(r,COL.outstanding)),0);
  const avgPrice = data.length ? data.reduce((s,r)=>s+num(pick(r,COL.unitPrice)),0)/data.length : 0;
  const avgEXW = data.length ? data.reduce((s,r)=>s+num(pick(r,COL.exw)),0)/data.length : 0;

  document.getElementById('tFoot').innerHTML = `
    <tr>
      <td colspan="5">GRAND TOTAL — ${data.length} contracts</td>
      <td class="avg-cell">${fmtPrice(avgPrice)}</td>
      <td class="avg-cell">${fmt(avgEXW)}</td>
      <td>${totSC.toLocaleString('id-ID')}</td>
      <td>${totVol.toLocaleString('id-ID')}</td>
      <td>${totOut.toLocaleString('id-ID')}</td>
    </tr>
    <tr class="avg-row">
      <td colspan="5">AVG</td>
      <td>${fmtPrice(avgPrice)}</td>
      <td>${fmt(avgEXW)}</td>
      <td>${data.length ? (totSC/data.length).toFixed(1) : '-'}</td>
      <td>${data.length ? (totVol/data.length).toFixed(1) : '-'}</td>
      <td>${data.length ? (totOut/data.length).toFixed(1) : '-'}</td>
    </tr>`;
}

// ── PIVOT 2: QTY PER MONTH ──
function renderPivot2(data) {
  const months = window._monthCols || [];
  const now = new Date();
  const currentMonthStr = now.toLocaleString('en-US', {month:'short'}) + '-' + String(now.getFullYear()).slice(-2);

  const fixedCols = ['Customer Name', 'Contract Number', 'Sales'];

  // HEAD
  const fixedHead = fixedCols.map((c,i) => `<th onclick="doSort('f${i}')" style="min-width:${i===0?200:150}px">${c}</th>`).join('');
  const monthHead = months.map(m => {
    const isRecent = m >= currentMonthStr;
    return `<th class="month-col${isRecent?' recent':''}">${m}</th>`;
  }).join('');
  document.getElementById('tHead').innerHTML = `<tr>${fixedHead}<th class="month-col" style="min-width:80px">Total</th>${monthHead}</tr>`;

  // BODY
  let html = '';
  data.forEach(row => {
    const monthVals = months.map(m => num(row[m]));
    const total = monthVals.reduce((a,b)=>a+b,0);
    const monthCells = monthVals.map(v =>
      `<td class="num ${v>0?'high':'zero'}">${v>0?v.toLocaleString('id-ID'):'-'}</td>`
    ).join('');
    html += `<tr>
      <td>${pick(row, COL.customer) || '-'}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${pick(row, COL.contractNum) || '-'}</td>
      <td>${pick(row, COL.sales) || '-'}</td>
      <td class="num ${total>0?'high':''}">${total>0?total.toLocaleString('id-ID'):'-'}</td>
      ${monthCells}
    </tr>`;
  });
  document.getElementById('tBody').innerHTML = html || `<tr><td colspan="${3+months.length+1}" class="empty-state">Tidak ada data</td></tr>`;

  // FOOT totals
  const monthTotals = months.map(m => data.reduce((s,r)=>s+num(r[m]),0));
  const grandTotal = monthTotals.reduce((a,b)=>a+b,0);
  const totalCells = monthTotals.map(v => `<td>${v>0?v.toLocaleString('id-ID'):'-'}</td>`).join('');
  const avgMonths = months.map(m => {
    const vals = data.map(r=>num(r[m])).filter(v=>v>0);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  });
  const avgCells = avgMonths.map(v => `<td>${v>0?v.toFixed(1):'-'}</td>`).join('');

  document.getElementById('tFoot').innerHTML = `
    <tr>
      <td colspan="3">GRAND TOTAL — ${data.length} contracts</td>
      <td>${grandTotal.toLocaleString('id-ID')}</td>
      ${totalCells}
    </tr>
    <tr class="avg-row">
      <td colspan="3">AVG (non-zero months)</td>
      <td>-</td>
      ${avgCells}
    </tr>`;
}

function doSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  render();
}

function switchPage(p) {
  currentPage = p;
  document.querySelectorAll('.page-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&p==='usd')||(i===1&&p==='idr')));
  // For now, same data — in full version, filter by type
  if (allData.length) render();
}

function switchPivot(n) {
  currentPivot = n;
  document.getElementById('ptab1').classList.toggle('active', n===1);
  document.getElementById('ptab2').classList.toggle('active', n===2);
  sortCol = null;
  render();
}

// ── EXPORT ──
function exportPivot1() {
  const data = getFiltered();
  const rows = data.map(r => ({
    'Customer Name': pick(r, COL.customer),
    'Contract Number': pick(r, COL.contractNum),
    'Sales Name': pick(r, COL.sales),
    'Product': pick(r, COL.product),
    'Status': pick(r, COL.status),
    'Customer Group': pick(r, COL.custGroup),
    'Unit Price ($/KG)': num(pick(r, COL.unitPrice)),
    'EXW ($/MT)': num(pick(r, COL.exw)),
    'SC Qty (mt)': num(pick(r, COL.scQty)),
    'Vol Fixations (mt)': num(pick(r, COL.volFix)),
    'Outstanding (mt)': num(pick(r, COL.outstanding)),
  }));

  // Totals & avg row
  const totals = { 'Customer Name': 'GRAND TOTAL', 'Contract Number': '', 'Sales Name': '', 'Product': '', 'Status': data.length + ' contracts', 'Customer Group': '' };
  ['Unit Price ($/KG)','EXW ($/MT)','SC Qty (mt)','Vol Fixations (mt)','Outstanding (mt)'].forEach(k => {
    totals[k] = rows.reduce((s,r)=>s+num(r[k]),0);
  });
  const avgs = { 'Customer Name': 'AVG', 'Contract Number': '', 'Sales Name': '', 'Product': '', 'Status': '', 'Customer Group': '' };
  ['Unit Price ($/KG)','EXW ($/MT)','SC Qty (mt)','Vol Fixations (mt)','Outstanding (mt)'].forEach(k => {
    avgs[k] = rows.length ? rows.reduce((s,r)=>s+num(r[k]),0)/rows.length : 0;
  });

  buildAndDownload([...rows, totals, avgs], 'USD_Pivot1_Summary');
}

function exportPivot2() {
  const data = getFiltered();
  const months = window._monthCols || [];
  const rows = data.map(r => {
    const row = {
      'Customer Name': pick(r, COL.customer),
      'Contract Number': pick(r, COL.contractNum),
      'Sales Name': pick(r, COL.sales),
      'Total': months.reduce((s,m)=>s+num(r[m]),0),
    };
    months.forEach(m => { row[m] = num(r[m]) || ''; });
    return row;
  });

  // Grand total row
  const grand = { 'Customer Name': 'GRAND TOTAL', 'Contract Number': '', 'Sales Name': '', 'Total': 0 };
  months.forEach(m => { grand[m] = data.reduce((s,r)=>s+num(r[m]),0) || ''; grand['Total'] += num(grand[m]); });

  // Avg row
  const avg = { 'Customer Name': 'AVG (non-zero)', 'Contract Number': '', 'Sales Name': '', 'Total': '' };
  months.forEach(m => {
    const vals = data.map(r=>num(r[m])).filter(v=>v>0);
    avg[m] = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '';
  });

  buildAndDownload([...rows, grand, avg], 'USD_Pivot2_Monthly');
}

function buildAndDownload(rows, name) {
  const ws = XLSX.utils.json_to_sheet(rows);
  // Style header
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let C = range.s.c; C <= range.e.c; C++) {
    const cell = ws[XLSX.utils.encode_cell({r:0,c:C})];
    if (cell) cell.s = { fill:{fgColor:{rgb:'1F2937'}}, font:{bold:true,color:{rgb:'94A3B8'}} };
  }
  // Style total & avg
  const lastR = range.e.r;
  for (let C = range.s.c; C <= range.e.c; C++) {
    const ta = ws[XLSX.utils.encode_cell({r:lastR-1,c:C})];
    if (ta) ta.s = { fill:{fgColor:{rgb:'1F2D1F'}}, font:{bold:true,color:{rgb:'56D364'}} };
    const aa = ws[XLSX.utils.encode_cell({r:lastR,c:C})];
    if (aa) aa.s = { fill:{fgColor:{rgb:'1F2820'}}, font:{color:{rgb:'D29922'}} };
  }
  // Col widths
  ws['!cols'] = Array(range.e.c+1).fill(null).map((_,i) => ({wch: i<4?22:12}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, name.replace(/[^a-zA-Z0-9]/g,'_').slice(0,31));
  XLSX.writeFile(wb, name + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
}
